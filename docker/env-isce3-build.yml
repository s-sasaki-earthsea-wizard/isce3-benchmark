# Mirrors isce3/environment.yml plus profiling/analysis tools we need inside
# the container. Keep this file in sync with upstream environment.yml when
# isce3 dependencies change.
name: isce3
channels:
  - conda-forge
  - nodefaults
dependencies:
  # --- isce3 upstream deps ---
  - backoff
  - cmake>=3.18
  - cxx-compiler
  # isce3 pins Eigen 3.3.7 with SAME_MAJOR_VERSION compatibility, so newer
  # Eigen on conda-forge (4.x / 5.x) is rejected at find_package() time.
  - eigen>=3.3,<4
  - fftw>=3.3
  - gdal>=3.6
  - gmock>=1.10
  - gtest>=1.10
  - h5py>=3
  - hdf5>=1.10.2,!=1.14.0
  - libgdal-hdf5
  - libgdal-netcdf
  - ninja
  - numpy>=1.20
  - pyaps3>=0.3
  - pybind11>=2.5
  - pyre>=1.12.5
  - pysolid>=0.2
  - pytest
  - python>=3.10
  - raider-base>=0.4.5
  - ruamel.yaml
  - scipy!=1.10.0
  - shapely>=2
  - snaphu>=0.4
  - yamale
  # --- benchmark / profiling additions ---
  - pip
  - py-spy
  - pytest-benchmark
  # --- Sentinel-1 stack (Plan E: COMPASS radar mode → isce3 GPU primitives) ---
  # COMPASS pulls a conda-forge `isce3` (CPU-only) as a transitive dep. That is
  # fine because docker/entrypoint.sh prepends our from-source CUDA build at
  # /opt/isce3-build/install/packages onto PYTHONPATH, so `import isce3` always
  # resolves to the GPU-enabled tree. The conda one is only here to satisfy
  # compass's dep solver.
  - compass>=0.5.6
  - s1reader>=0.2.5
  - sentineleof>=0.12
  - dem_stitcher>=2.5
  - pip:
      - pynvml
